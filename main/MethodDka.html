<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>MethodDka - High Precision (Error/Iteration Display)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/decimal.js/10.4.3/decimal.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #f9f9f9; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; background-color: white; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .input-field { margin-bottom: 10px; }
        .input-field input { width: 100%; padding: 8px; box-sizing: border-box; }
        .button { padding: 10px 20px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        #progress { margin: 15px 0; font-weight: bold; color: #007bff; }
        .result { margin-top: 10px; padding: 10px; background-color: #e9ecef; border-radius: 4px; font-family: monospace; border-left: 5px solid #007bff; }
        .summary { margin-top: 15px; padding: 15px; background-color: #d1e7dd; border-radius: 4px; font-family: monospace; border-left: 5px solid #0f5132; color: #0f5132; }
        .err-warn { color: #dc3545; font-weight: bold; }
        .err-ok { color: #28a745; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>MethodDka (50桁・誤差/回数表示版)</h1>
        <div class="input-field">
            <label>最高次数: <input type="number" id="maxDegree" value="4" /></label>
        </div>
        <button class="button" onclick="createFields()">生成</button>
        <div id="coefficients"></div>
        <button class="button" onclick="startCalculation()">計算開始</button>
        <div id="progress"></div>
        <div id="results"></div>
    </div>

    <script>
        Decimal.set({ precision: 50 });
        let n = null;
        let sa = [], sr = [], si = [], sErr = [], sIter = [];

        function createFields() {
            n = parseInt(document.getElementById('maxDegree').value);
            const div = document.getElementById('coefficients');
            div.innerHTML = '';
            for (let i = 0; i <= n; i++) {
                div.innerHTML += `<div class="input-field"><label>${n - i}次の係数:</label><input type="text" id="coeff${i}" value="0" /></div>`;
            }
        }

        async function startCalculation() {
            if (n === null) { alert('生成ボタンを押してください'); return; }

            for (let i = 0; i <= n; i++) sa[i] = new Decimal(document.getElementById('coeff' + i).value || "0");
            const prog = document.getElementById('progress');
            const resDiv = document.getElementById('results');
            resDiv.innerHTML = '';
            
            for (let i = 1; i <= n; i++) sIter[i] = 0;

            let a0 = sa[0];
            for (let i = 0; i <= n; i++) sa[i] = sa[i].div(a0);

            let sp = Decimal.acos(-1);
            for (let j = 1; j <= n; j++) {
                let ang = 2 * sp * j / n;
                sr[j] = new Decimal(2).mul(Decimal.cos(ang));
                si[j] = new Decimal(2).mul(Decimal.sin(ang));
            }

            // セイフティロックを10,000回に修正
            const maxIter = 10000;
            for (let k = 1; k <= maxIter; k++) {
                if (k % 20 === 0) {
                    prog.innerText = `計算中... ループ回数: ${k} / ${maxIter}`;
                    await new Promise(r => setTimeout(r, 0));
                }

                let bContinue = false;
                for (let i = 1; i <= n; i++) {
                    if (sErr[i] && sErr[i].lte("1e-45")) continue;

                    let pr = sa[0], pi = new Decimal(0);
                    for (let j = 1; j <= n; j++) {
                        let nr = pr.mul(sr[i]).sub(pi.mul(si[i])).add(sa[j]);
                        pi = pr.mul(si[i]).add(pi.mul(sr[i]));
                        pr = nr;
                    }
                    let dr = new Decimal(1), di = new Decimal(0);
                    for (let j = 1; j <= n; j++) {
                        if (i === j) continue;
                        let diffR = sr[i].sub(sr[j]), diffI = si[i].sub(si[j]);
                        let nr = dr.mul(diffR).sub(di.mul(diffI));
                        di = dr.mul(diffI).add(di.mul(diffR));
                        dr = nr;
                    }
                    let mag = dr.mul(dr).add(di.mul(di));
                    let ur = (pr.mul(dr).add(pi.mul(di))).div(mag);
                    let ui = (pi.mul(dr).sub(pr.mul(di))).div(mag);

                    sr[i] = sr[i].sub(ur);
                    si[i] = si[i].sub(ui);

                    sErr[i] = ur.abs().add(ui.abs());
                    sIter[i] = k;

                    if (sErr[i].gt("1e-45")) bContinue = true;
                }
                if (!bContinue) break;
            }

            prog.innerText = "計算完了";
            let totalIterations = 0;
            for (let i = 1; i <= n; i++) {
                let isBad = sErr[i].gte("1e-44");
                totalIterations += sIter[i];
                resDiv.innerHTML += `<div class="result">
                    解${i}: ${sr[i].toFixed(40)} + (${si[i].toFixed(40)})i<br>
                    <span class="${isBad ? 'err-warn' : 'err-ok'}">誤差半径: ${sErr[i].toExponential(4)}</span><br>
                    <strong>収束反復回数: ${sIter[i]}回</strong>
                </div>`;
            }
            resDiv.innerHTML += `<div class="summary">
                <strong>全合計反復回数: ${totalIterations}回</strong>
            </div>`;
        }
    </script>
</body>
</html>
