<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>MethodDka - Factorization Final Edition (10000 limit) Fixed</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/decimal.js/10.4.3/decimal.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f9; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .input-field { margin-bottom: 10px; }
        .input-field input { padding: 6px; box-sizing: border-box; background-color: #fcfcfc; border: 1px solid #d0d0d0; }
        .button { padding: 10px 20px; background:#28a745; color:white; border:none; cursor:pointer; font-size: 14px; border-radius: 4px; }
        .button:disabled { background: #a6a6a6; cursor: not-allowed; }
        #progress { font-family: monospace; font-weight: bold; color: #007bff; margin: 15px 0; }
        .result { margin-top: 15px; padding: 12px; background: #f8f9fa; border-left: 5px solid #007bff; font-family: monospace; white-space: pre-wrap; word-break: break-all; }
        .summary { margin-top: 15px; padding: 15px; background-color: #d1e7dd; border-radius: 4px; border-left: 5px solid #0f5132; color: #0f5132; font-family: monospace; }
        .err-warn { color: #dc3545; font-weight: bold; }
        .err-ok { color: #28a745; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>因数分解専用：MethodDka（バグ修正済）</h1>
        <div class="input-field">
            最高次数: <input type="number" id="deg" value="4" min="1"> 
            <button id="genButton" class="button" style="background:#007bff;" onclick="gen()">生成</button>
        </div>
        <div id="fields" style="margin:15px 0;"></div>
        <button id="calcButton" class="button" onclick="startCalc()" disabled>因数分解開始</button>
        <div id="progress"></div>
        <div id="res"></div>
    </div>

    <script>
        Decimal.set({ precision: 50 });
        let n = null, sa = [], sr = [], si = [], sErr = [], sIter = [];

        function gen() {
            n = parseInt(document.getElementById('deg').value);
            if (isNaN(n) || n <= 0) { alert('次数を正の整数で入力してください'); return; }

            let h = ''; 
            for (let i = 0; i <= n; i++) {
                h += `<div class="input-field">${n - i}次係数: <input type="text" id="c${i}" class="coeff-input" value="0"></div>`;
            }
            document.getElementById('fields').innerHTML = h;

            // テスト用デフォルト（x^4 + 5x^2 + 4 = 0）
            if (n === 4) {
                document.getElementById('c0').value = "1";
                document.getElementById('c1').value = "0";
                document.getElementById('c2').value = "5";
                document.getElementById('c3').value = "0";
                document.getElementById('c4').value = "4";
            }
            document.getElementById('calcButton').disabled = false;
            document.getElementById('progress').innerText = "係数を入力して「因数分解開始」を押してください。";
            document.getElementById('res').innerHTML = "";
        }

        async function startCalc() {
            if (n === null || document.getElementById('fields').innerHTML === '') {
                alert('生成ボタンを押してください');
                return;
            }

            const calcButton = document.getElementById('calcButton');
            const genButton = document.getElementById('genButton');
            const prog = document.getElementById('progress');
            const resDiv = document.getElementById('res');

            // ❌ 多重実行（フリーズ原因）を防ぐため、ボタンをロック
            calcButton.disabled = true;
            genButton.disabled = true;
            resDiv.innerHTML = '';

            try {
                for (let i = 0; i <= n; i++) {
                    const val = document.getElementById('c' + i).value;
                    if (val.trim() === "") throw new Error();
                    sa[i] = new Decimal(val);
                }
            } catch(e) {
                alert('係数はすべて数値で入力してください。');
                calcButton.disabled = false;
                genButton.disabled = false;
                return;
            }

            let a0 = sa[0];
            if (a0.isZero()) {
                alert("最高次の係数が0です。次数を再設定してください。");
                calcButton.disabled = false;
                genButton.disabled = false;
                return;
            }
            for (let i = 0; i <= n; i++) sa[i] = sa[i].div(a0);

            // 初期化
            let sp = Decimal.acos(-1);
            for (let i = 1; i <= n; i++) {
                let ang = new Decimal(2).mul(sp).mul(i).div(n);
                sr[i] = new Decimal(2).mul(Decimal.cos(ang));
                si[i] = new Decimal(2).mul(Decimal.sin(ang));
                sIter[i] = 0;
                sErr[i] = new Decimal(1); // 初期誤差
            }

            const maxIter = 10000;
            let isConvergedGlobal = false;

            for (let k = 1; k <= maxIter; k++) {
                if (k % 20 === 0) {
                    prog.innerText = `計算中... ループ回数: ${k}/${maxIter}`;
                    await new Promise(r => setTimeout(r, 0));
                }

                let bContinue = false;
                for (let i = 1; i <= n; i++) {
                    if (sErr[i] && sErr[i].lte("1e-45")) continue;

                    let pr = sa[0], pi = new Decimal(0);
                    for (let j = 1; j <= n; j++) {
                        let nr = pr.mul(sr[i]).sub(pi.mul(si[i])).add(sa[j]);
                        pi = pr.mul(si[i]).add(pi.mul(sr[i]));
                        pr = nr;
                    }
                    let dr = new Decimal(1), di = new Decimal(0);
                    for (let j = 1; j <= n; j++) {
                        if (i === j) continue;
                        let diffR = sr[i].sub(sr[j]), diffI = si[i].sub(si[j]);
                        let nr = dr.mul(diffR).sub(di.mul(diffI));
                        di = dr.mul(diffI).add(di.mul(diffR));
                        dr = nr;
                    }
                    let mag = dr.mul(dr).add(di.mul(di));
                    if (mag.isZero()) mag = new Decimal("1e-100");

                    sr[i] = sr[i].sub((pr.mul(dr).add(pi.mul(di))).div(mag));
                    si[i] = si[i].sub((pi.mul(dr).sub(pr.mul(di))).div(mag));
                    sErr[i] = pr.abs().add(pi.abs());
                    sIter[i] = k;

                    if (sErr[i].gt("1e-45")) bContinue = true;
                }
                if (!bContinue) {
                    isConvergedGlobal = true;
                    break;
                }
            }

            // ⭕ ボタンのロックを解除（最初に戻れる状態へ復帰）
            calcButton.disabled = false;
            genButton.disabled = false;

            // ⭕ 【重要バグ修正】1万回ループで収束しなかった場合の処理
            if (!isConvergedGlobal) {
                prog.innerHTML = "<span class='err-warn'>【警告】セーフティロック（10,000回）までに収束しませんでした。</span>";
                alert("【因数分解失敗】最大反復回数（10,000回）以内に解が収束しませんでした。\n係数の設定（ウィルキンソン多項式など）を見直してください。");
                return; // ここで安全に処理を打ち切り、最初の状態を維持して戻る
            }

            // 正常収束時のみ以下を出力
            prog.innerText = "計算完了";
            resDiv.innerHTML = '<h3>因数分解結果:</h3>';
            
            let totalIterations = 0;
            for (let i = 1; i <= n; i++) {
                let re = Math.round(Number(sr[i]));
                let im = Math.round(Number(si[i]));
                let isBad = sErr[i].gte("1e-44");
                totalIterations += sIter[i];

                let term = im === 0 ? `${re}` : (re + (im > 0 ? ' + ' + im + 'i' : ' - ' + Math.abs(im) + 'i'));
                resDiv.innerHTML += `<div class="result">
                    因数${i}: (x - ${term})<br>
                    <span class="${isBad ? 'err-warn' : 'err-ok'}">収束誤差: ${sErr[i].toExponential(4)}</span><br>
                    <strong>収束反復回数: ${sIter[i]}回</strong>
                </div>`;
            }
            resDiv.innerHTML += `<div class="summary"><strong>全合計反復回数: ${totalIterations}回</strong></div>`;
        }
    </script>
</body>
</html>
